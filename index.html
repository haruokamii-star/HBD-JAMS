<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jamilat!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The Envelope Intro -->
    <div class="envelope-wrapper" id="envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-front"></div>
        <div class="envelope-text">Open Me! 💌</div>
    </div>

    <!-- The Hidden Birthday Content -->
    <div class="birthday-container hidden" id="main-content">
        <h1 id="greeting">Happy 22nd Birthday Jamilat! 🎉</h1>
        
        <div class="cake">
            <div class="icing"></div>
            <div class="candles-container">
                <!-- First Number 2 Candle -->
                <div class="number-candle">
                    <div class="flame"></div>
                    2
                </div>
                <!-- Second Number 2 Candle -->
                <div class="number-candle">
                    <div class="flame"></div>
                    2
                </div>
            </div>
        </div>

        <!-- Balloons will be generated here by script.js -->
        <div class="balloons-container" id="balloons"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
